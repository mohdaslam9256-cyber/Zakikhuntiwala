<html>
<head>
<style>
     div {
	width:100px;
	height:120px;
	animation-name:aslam; 
	background-color:skyblue;
	animation-duration:4s;
	
	}
@keyframes aslam{
	0%{background-color:red; left:0px; top:0px;}
	25%{background-color:yellow; left:200px; top:0px;}
	50%{background-color:green; left:200px; top:200px;}
	70%{background-color:black; left:0px; top:200px;}
	100%{background-color:blue; left:0px; top:0px;}
	}


</style>
</head>
<body>

<h1 style=color:red;>CSS Animation</h1>
<div>Aslam</div>
<p style=color:blue; ><b>note:</b>when an animation is finished, it goes back to its orignal style.</p>

</body>
</html>
